{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Data Quality Checker{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'quality_checks/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'quality_checks/css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Data Quality Checker - Beta</a>

            {% if request.user.is_authenticated %}
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">

                    <li class="nav-item">
                        <span class="navbar-text">
                            Logged in as:
                            <strong class="text-white">{{ request.user.username }}</strong>
                        </span>
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'archive' %}" class="btn btn-outline-light btn-sm">
                            Archive
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                            Logout
                        </a>
                    </li>

                </ul>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="container my-4">
        {% block body %}
       
        {% endblock %}
    </main>

    <footer class="bg-light text-center" style="position: fixed; bottom: 0; width: 100%;">
        <p class="mb-0">© {% now "Y" %} Data Quality Checker</p>
    </footer>

</body>
</html>
